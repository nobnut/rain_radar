<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="initial-scale=1.0, width=device-width, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: transparent; overflow: hidden; }
        #map { width: 100vw; height: 100vh; background-color: #1a1a1a; border-radius: 0px; overflow: hidden; }
        
        /* Top HUD */
        #top-hud { 
            position: absolute; top: 10px; left: 0; width: 100%; 
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            z-index: 1000; pointer-events: none;
        }
        #timestamp { 
            background: rgba(0, 0, 0, 0.7); color: #fff; padding: 2px 10px; 
            border-radius: 10px; font-family: sans-serif; font-size: 10px; 
            backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1);
        }
        #legend-bar {
            display: flex; align-items: center; gap: 5px;
            background: rgba(0, 0, 0, 0.7); padding: 3px 8px; border-radius: 6px;
        }
        .grad { 
            width: 70px; height: 5px; border-radius: 3px;
            background: linear-gradient(to right, #72ff72, #ffff00, #ffaa00, #ff0000, #ff00ff);
        }
        .legend-text { color: #aaa; font-family: sans-serif; font-size: 8px; font-weight: bold; }

        /* Range Ring Labels */
        .ring-label {
            color: rgba(255, 255, 255, 0.7); font-family: sans-serif; font-size: 9px;
            font-weight: bold; text-shadow: 1px 1px 3px #000, -1px -1px 3px #000;
            white-space: nowrap; pointer-events: none;
        }

        /* Bottom Controls */
        #controls { 
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; display: flex; align-items: center; gap: 6px;
            background: rgba(0, 0, 0, 0.75); padding: 4px 10px; border-radius: 20px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15);
        }
        .btn { 
            background: #3b82f6; border: none; color: white; width: 26px; height: 26px; 
            border-radius: 50%; cursor: pointer; font-size: 12px; display: flex; 
            align-items: center; justify-content: center; font-weight: bold;
        }
        #recenter-btn { background: #4b5563; }
        #range-btn { background: #6366f1; font-size: 10px; } 
        #palette-btn { background: #ec4899; font-size: 10px; }
        #nowcast-btn { background: #eab308; font-size: 10px; }
        #frame-label { color:white; font-family:sans-serif; font-size: 10px; width: 40px; text-align: center; font-weight: bold; }

        /* Nowcast Modal */
        #nowcast-modal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 400px; background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px;
            padding: 15px; z-index: 2000; backdrop-filter: blur(10px); color: white;
            font-family: sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .modal-title { font-size: 14px; font-weight: bold; margin: 0; }
        .close-btn { background: none; border: none; color: #aaa; font-size: 18px; cursor: pointer; }
        #nowcast-content { font-size: 12px; }

        .leaflet-control-attribution { display: none !important; }
    </style>
    <!-- Link to the manifest file -->
<link rel="manifest" href="./manifest.json">

<!-- Register the Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(registration => {
          console.log('Service Worker registered successfully');
        })
        .catch(error => {
          console.log('Service Worker registration failed:', error);
        });
    });
  }
</script>

</head>
<body>
    <div id="top-hud">
        <div id="timestamp">Syncing...</div>
        <div id="legend-bar">
            <span class="legend-text">L</span>
            <div class="grad"></div>
            <span class="legend-text">H</span>
        </div>
    </div>
    
    <div id="controls">
        <button class="btn" id="recenter-btn" onclick="recenterMap()">O</button>
        <button class="btn" id="range-btn" onclick="toggleRings()">R</button>
        <button class="btn" id="palette-btn" onclick="togglePalette()" title="Toggle Intensity Palette">P</button>
        <button class="btn" id="nowcast-btn" onclick="showNowcast()" title="4-Hour Nowcast">N</button>
        <button class="btn" id="play-btn" onclick="togglePlayback()">></button>
        <div id="frame-label">NOW</div>
    </div>

    <div id="nowcast-modal">
        <div class="modal-header">
            <h3 class="modal-title">4-Hour Rain Nowcast</h3>
            <button class="close-btn" onclick="closeNowcast()">×</button>
        </div>
        <div id="nowcast-content">Loading...</div>
    </div>

    <div id="map"></div>

    <script>
        let map, layers = [], currentFrame = 0, isPlaying = false, playInterval;
        let userLat, userLng;
        let rangeGroup = L.layerGroup(); 
        let ringsShowing = false;
        
        // Palette Management
        let currentPalette = 0;
        const palettes = [0, 2, 4]; // 0: Rainbow, 2: Dark Sky, 4: Nexrad
        const paletteNames = ["Rainbow", "DarkSky", "Nexrad"];
        
        const offsets = [0, 600, 1200, 1800, 2400, 3000, 3600]; 
        
        // --- API KEY MANAGEMENT ---
        let token = localStorage.getItem('rainbow_api_key');
        if (!token) {
            token = prompt("Please enter your Rainbow API key:");
            if (token) {
                localStorage.setItem('rainbow_api_key', token);
            } else {
                alert("API key is required for the radar to work. Please refresh the page to try again.");
            }
        }

        // --- GEOLOCATION MANAGEMENT ---
        function initMap() {
            document.getElementById('timestamp').innerHTML = "Locating...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLat = position.coords.latitude;
                        userLng = position.coords.longitude;
                        buildMap();
                    },
                    (error) => {
                        document.getElementById('timestamp').innerHTML = "Location Error";
                        alert("Unable to retrieve your location: " + error.message + ". Defaulting to London.");
                        userLat = 51.5074; 
                        userLng = -0.1278; 
                        buildMap();
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } else {
                document.getElementById('timestamp').innerHTML = "Geo Not Supported";
                alert("Geolocation is not supported by your browser.");
            }
        }

        // --- MAP INITIALIZATION ---
        function buildMap() {
            try {
                map = L.map('map', { zoomControl: false, attributionControl: false }).setView([userLat, userLng], 7);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

                const nowSec = Math.floor(Date.now() / 1000);
                const snapshot = nowSec - (nowSec % 600) - 600;

                offsets.forEach((offset, index) => {
                    const url = `https://api.rainbow.ai/tiles/v1/precip/${snapshot}/${offset}/{z}/{x}/{y}?token=${token}&color=${palettes[currentPalette]}`;
                    const layer = L.tileLayer(url, { opacity: index === 0 ? 0.8 : 0, maxZoom: 12 }).addTo(map);
                    layers.push(layer);
                });

                // User Location Pin
                L.circleMarker([userLat, userLng], { radius: 4, fillColor: "#00f2ff", color: "#fff", weight: 1.5, fillOpacity: 1 }).addTo(map);
                
                // Draw Range Rings
                const miles = [5, 10, 20, 30, 50, 100]; 
                miles.forEach(m => {
                    const meters = m * 1609.34;
                    L.circle([userLat, userLng], {
                        radius: meters, color: 'rgba(255, 255, 255, 0.75)', weight: 1, fill: false, dashArray: '5, 10', interactive: false
                    }).addTo(rangeGroup);

                    const labelLat = userLat + (m / 69.0);
                    L.marker([labelLat, userLng], {
                        icon: L.divIcon({ className: 'ring-label', html: `${m} mi`, iconSize: [40, 12], iconAnchor: [20, 6] }),
                        interactive: false
                    }).addTo(rangeGroup);
                });

                const timeStr = new Date(snapshot * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                document.getElementById('timestamp').innerHTML = `Radar: ${timeStr} | ${paletteNames[currentPalette]}`;
                
                setTimeout(() => { map.invalidateSize(); }, 500);
            } catch (e) {
                document.getElementById('timestamp').innerHTML = "Error: " + e.message;
            }
        }

        // --- PALETTE TOGGLE ---
        function togglePalette() {
            currentPalette = (currentPalette + 1) % palettes.length;
            const nowSec = Math.floor(Date.now() / 1000);
            const snapshot = nowSec - (nowSec % 600) - 600;
            
            // Update URLs for all layers to refresh the intensity look
            layers.forEach((layer, index) => {
                const offset = offsets[index];
                const newUrl = `https://api.rainbow.ai/tiles/v1/precip/${snapshot}/${offset}/{z}/{x}/{y}?token=${token}&color=${palettes[currentPalette]}`;
                layer.setUrl(newUrl);
            });
            
            const timeStr = new Date(snapshot * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('timestamp').innerHTML = `Radar: ${timeStr} | ${paletteNames[currentPalette]}`;
        }

        function toggleRings() {
            ringsShowing = !ringsShowing;
            const btn = document.getElementById('range-btn');
            if (ringsShowing) { rangeGroup.addTo(map); btn.style.background = "#10b981"; } 
            else { map.removeLayer(rangeGroup); btn.style.background = "#6366f1"; }
        }

        function recenterMap() {
            if (map && userLat && userLng) {
                map.flyTo([userLat, userLng], 8, { duration: 1.5 });
            }
        }

        function showFrame(index) {
            layers.forEach((layer, i) => layer.setOpacity(i === index ? 0.8 : 0));
            const mins = offsets[index] / 60;
            document.getElementById('frame-label').innerHTML = mins === 0 ? "NOW" : "+" + mins + "m";
        }

        function togglePlayback() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('play-btn');
            if (isPlaying) {
                btn.innerHTML = "⏸";
                playInterval = setInterval(() => {
                    currentFrame = (currentFrame + 1) % layers.length;
                    showFrame(currentFrame);
                }, 900);
            } else {
                btn.innerHTML = "▶";
                clearInterval(playInterval);
                currentFrame = 0;
                showFrame(0);
            }
        }

        // --- NOWCAST FUNCTIONALITY ---
        async function showNowcast() {
            document.getElementById('nowcast-modal').style.display = 'block';
            const content = document.getElementById('nowcast-content');
            content.innerHTML = 'Loading Nowcast data...';

            try {
                // We use the same token for the Nowcast lookup
                const url = `https://api.rainbow.ai/nowcast/v1/precip/${userLng}/${userLat}?token=${token}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error("API Request Failed");
                const data = await response.json();
                
                renderNowcast(data);
            } catch (e) {
                content.innerHTML = `<span style="color: #ef4444;">Error loading Nowcast: ${e.message}</span>`;
            }
        }

        function closeNowcast() {
            document.getElementById('nowcast-modal').style.display = 'none';
        }

        function renderNowcast(data) {
            if (!data.forecast || data.forecast.length === 0) {
                document.getElementById('nowcast-content').innerHTML = "No precipitation data available.";
                return;
            }
            
            const maxRate = Math.max(...data.forecast.map(f => f.precipRate));
            
            // Build Graph
            let html = `<div style="display:flex; height: 80px; align-items: flex-end; gap: 1px; border-bottom: 1px solid #666; margin-top: 5px;">`;
            
            let precipStarted = false;
            let startTimestamp = null;
            let endTimestamp = null;
            
            data.forecast.forEach(f => {
                // Scaling heights to max rate (capped visual height)
                const height = maxRate > 0 ? (f.precipRate / Math.max(maxRate, 10)) * 100 : 0; 
                const displayHeight = Math.min(height, 100);
                
                let color = '#3b82f6'; // Default Rain (Blue)
                if (f.precipType === 'snow') color = '#fff';
                else if (f.precipType === 'mixed') color = '#a855f7'; // Purple
                
                html += `<div style="flex: 1; background: ${color}; height: ${displayHeight}%; min-height: ${f.precipRate > 0 ? 1 : 0}px;"></div>`;
                
                // Track start/stop times
                if (f.precipRate > 0) {
                    if (!precipStarted) {
                        precipStarted = true;
                        startTimestamp = f.timestampBegin;
                    }
                    endTimestamp = f.timestampEnd; 
                }
            });
            html += `</div>`;
            
            // Time Labels
            const startTimeStr = new Date(data.forecast[0].timestampBegin * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const endTimeStr = new Date(data.forecast[data.forecast.length-1].timestampEnd * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            html += `<div style="display:flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-top: 4px;">
                <span>${startTimeStr}</span>
                <span>+4 Hours (${endTimeStr})</span>
            </div>`;
            
            // Text Summary & Relative Intensity
            let textSummary = `<div style="margin-top: 15px; font-size: 12px; line-height: 1.5; color: #fff;">`;
            
            if (maxRate === 0) {
                textSummary += `<strong>No precipitation expected</strong> in the next 4 hours.`;
            } else {
                const getIntensity = (rate) => {
                    if (rate < 0.5) return "Very Light";
                    if (rate < 2.5) return "Light";
                    if (rate < 10) return "Moderate";
                    if (rate < 50) return "Heavy";
                    return "Violent";
                };
                
                const startStr = startTimestamp ? new Date(startTimestamp * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
                const endStr = endTimestamp ? new Date(endTimestamp * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
                
                textSummary += `<strong>Max Intensity:</strong> ${getIntensity(maxRate)} (${maxRate.toFixed(1)} mm/h)<br>`;
                textSummary += `<strong>Expected Period:</strong> ${startStr} - ${endStr}`;
            }
            textSummary += `</div>`;
            
            document.getElementById('nowcast-content').innerHTML = html + textSummary;
        }

        window.onload = initMap;
    </script>
</body>
</html>
